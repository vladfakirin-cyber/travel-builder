<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartTravel Builder</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        .header h1 { font-size: 3em; margin-bottom: 10px; }
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        .form-group label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #555;
        }
        .form-group input, .form-group select {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }
        .interests-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }
        .interest-btn {
            padding: 8px 16px;
            background: #f5f5f5;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .interest-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        @media (max-width: 768px) {
            .card { padding: 20px; }
            .header h1 { font-size: 2em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✈️ SmartTravel Builder</h1>
            <p>10+ стран | Билеты ТУДА и ОБРАТНО</p>
        </div>
        <div class="card">
            <form action="/search" method="POST">
                <div class="form-grid">
                    <div class="form-group">
                        <label>🌍 Направление</label>
                        <select name="destination" required>
                            <option value="">Выберите страну</option>
                            <option value="Сочи">Сочи, Россия</option>
                            <option value="Турция">Турция</option>
                            <option value="Мальдивы">Мальдивы</option>
                            <option value="Таиланд">Таиланд</option>
                            <option value="Египет">Египет</option>
                            <option value="ОАЭ">ОАЭ (Дубай)</option>
                            <option value="Италия">Италия</option>
                            <option value="Испания">Испания</option>
                            <option value="Греция">Греция</option>
                            <option value="Кипр">Кипр</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>📅 Дата заезда</label>
                        <input type="date" name="start_date" required>
                    </div>
                    <div class="form-group">
                        <label>📅 Дата выезда</label>
                        <input type="date" name="end_date" required>
                    </div>
                    <div class="form-group">
                        <label>👥 Взрослых</label>
                        <input type="number" name="adults" value="2" min="1">
                    </div>
                    <div class="form-group">
                        <label>👶 Детей</label>
                        <input type="number" name="children" value="0" min="0">
                    </div>
                    <div class="form-group">
                        <label>💰 Бюджет (₽)</label>
                        <input type="number" name="budget" placeholder="Не обязательно">
                    </div>
                    <div class="form-group">
                        <label>⭐ Звездность</label>
                        <select name="hotel_stars">
                            <option value="">Любая</option>
                            <option value="5">5 звезд</option>
                            <option value="4">4 звезды</option>
                            <option value="3">3 звезды</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>🎯 Интересы</label>
                        <div class="interests-buttons" id="interestsButtons">
                            <button type="button" class="interest-btn" data-interest="пляж">🏖️ Пляж</button>
                            <button type="button" class="interest-btn" data-interest="культура">🏛️ Культура</button>
                            <button type="button" class="interest-btn" data-interest="приключения">🏔️ Приключения</button>
                            <button type="button" class="interest-btn" data-interest="гастрономия">🍷 Гастрономия</button>
                            <button type="button" class="interest-btn" data-interest="шопинг">🛍️ Шопинг</button>
                            <button type="button" class="interest-btn" data-interest="семья">👨‍👩‍👧 Семья</button>
                        </div>
                        <input type="hidden" name="interests" id="interests" value="[]">
                    </div>
                    <div class="form-group">
                        <label>👤 Ваше имя</label>
                        <input type="text" name="user_name">
                    </div>
                    <div class="form-group">
                        <label>📧 Email</label>
                        <input type="email" name="user_email">
                    </div>
                </div>
                <button type="submit" class="btn-submit">🚀 Найти варианты (ТУДА и ОБРАТНО)</button>
            </form>
        </div>
    </div>
    <script>
        let interests = [];
        document.querySelectorAll('.interest-btn').forEach(btn => {
            btn.onclick = (e) => {
                e.preventDefault();
                const val = btn.dataset.interest;
                if (interests.includes(val)) {
                    interests = interests.filter(i => i !== val);
                    btn.classList.remove('active');
                } else {
                    interests.push(val);
                    btn.classList.add('active');
                }
                document.getElementById('interests').value = JSON.stringify(interests);
            };
        });
        const today = new Date().toISOString().split('T')[0];
        document.querySelector('input[name="start_date"]').min = today;
        document.querySelector('input[name="start_date"]').onchange = function() {
            document.querySelector('input[name="end_date"]').min = this.value;
        };
    </script>
</body>
</html>
